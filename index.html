<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cek Onhand</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Cek Onhand</h1>

  <input
    type="text"
    id="storeInput"
    placeholder="Store ID"
    value="N497"
  >

  <textarea
    id="pluInput"
    placeholder="Masukkan PLU dipisah koma atau enter"
  ></textarea>

  <button id="cekBtn">
    Cek Onhand
  </button>

  <input
    type="text"
    id="searchInput"
    placeholder="Cari PLU / Nama Barang"
  >

  <div id="info"></div>

  <table>
    <thead>
      <tr>
        <th>Barcode</th>
        <th>PLU</th>
        <th>Nama Barang</th>
        <th>Onhand</th>
      </tr>
    </thead>

    <tbody id="tableBody"></tbody>
  </table>

</div>

<script src="script.js"></script>
</body>
</html>
