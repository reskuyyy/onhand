<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rack Lookup</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Rack Lookup</h1>

    <div class="controls">
      <input type="text" id="storeInput" placeholder="Store ID (contoh: N497)" value="N497" />

      <input type="text" id="rackInput" placeholder="Rack (contoh: AU1)" value="AU1" />

      <button id="loadBtn">Load Data</button>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Cari barcode atau PLU..." />
    </div>

    <div class="info" id="info"></div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Barcode</th>
            <th>PLU</th>
            <th>Onhand</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
